{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Signup - Library Management</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;">

<div class="modal-box" style="width:420px;">
  <h3><i class="fa-solid fa-user-plus"></i> Create Member Account</h3>
  {% if error %}<p style="color:#ef4444;margin-bottom:14px;">{{ error }}</p>{% endif %}
  <form method="POST">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="text" name="phone" placeholder="Phone (optional)">
    <input type="text" name="username" placeholder="Choose a username" required>
    <input type="password" name="password" placeholder="Choose a password" required>
    <div class="modal-actions" style="justify-content:stretch;">
      <button id="submitAddBook" type="submit" style="width:100%;">Sign Up</button>
    </div>
  </form>
  <p style="margin-top:15px;font-size:13px;color:#6b7280;text-align:center;">
    Already have an account? <a href="{% url 'member_login' %}" style="color:#2d6a4f;font-weight:600;">Log in</a>
  </p>
</div>

</body>
</html>
