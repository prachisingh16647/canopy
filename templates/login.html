{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Library Management</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;">

<div class="modal-box" style="width:380px;">
  <h3><i class="fa-solid fa-book-open-reader"></i> Librarian Login</h3>
  {% if error %}<p style="color:#ef4444;margin-bottom:14px;">{{ error }}</p>{% endif %}
  <form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <div class="modal-actions" style="justify-content:stretch;">
      <button id="submitAddBook" type="submit" style="width:100%;">Login</button>
    </div>
  </form>
</div>

</body>
</html>
