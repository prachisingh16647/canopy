{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Due Books - Library Management</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<div class="container">

<aside class="sidebar">
<div class="logo">
<i class="fa-solid fa-book-open-reader"></i>
<h2>Library</h2>
</div>
<ul class="menu">
<li onclick="location.href='{% url 'dashboard' %}'"><i class="fa-solid fa-house"></i><span>Dashboard</span></li>
<li onclick="location.href='{% url 'books_page' %}'"><i class="fa-solid fa-book"></i><span>Books</span></li>
<li onclick="location.href='{% url 'members_page' %}'"><i class="fa-solid fa-users"></i><span>Members</span></li>
<li onclick="location.href='{% url 'issue_page' %}'"><i class="fa-solid fa-arrow-right"></i><span>Issue Book</span></li>
<li onclick="location.href='{% url 'return_page' %}'"><i class="fa-solid fa-arrow-left"></i><span>Return Book</span></li>
<li class="active"><i class="fa-solid fa-clock"></i><span>Due Books</span></li>
<li onclick="location.href='{% url 'reports_page' %}'"><i class="fa-solid fa-chart-column"></i><span>Reports</span></li>
<li onclick="location.href='{% url 'settings_page' %}'"><i class="fa-solid fa-gear"></i><span>Settings</span></li>
<li onclick="location.href='{% url 'logout' %}'"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></li>
</ul>
</aside>

<main class="main">

<header>
<div>
<h1>Due Books</h1>
<p>Books that are due soon or overdue</p>
</div>
</header>

<div class="table-box">
<div class="title">
<h3>Due &amp; Overdue Books</h3>
</div>
<table>
<thead>
<tr>
<th>Book</th>
<th>Member</th>
<th>Due Date</th>
<th>Status</th>
</tr>
</thead>
<tbody id="dueBooksBody"></tbody>
</table>
</div>

</main>

</div>

<script src="{% static 'due-books.js' %}"></script>

</body>
</html>
